[Paths]
input_folder = INPUT
output_folder = OUTPUT
reference_file = B787-Task EO_updating.xlsx
reference_folder = REFERENCE

[Processing]
ignore_missing_columns = False
enable_special_code = True
enable_tool_control = True

[ReferenceSheet]
# Task sheet configuration
task_sheet_name = Task
task_id_column = Taskcard Number

# EO sheet configuration
eo_sheet_name = EO
eo_id_column = EO

# EO ID prefix for identification
eo_prefix = EO

# Bonus hours lookup configuration
bonus_hours_file = vB20WHourNorm.xlsx

# Bonus hours column names (columns in vB20WHourNorm.xlsx sheets)
aircraft_code_column = AircraftCode
product_code_column = ProductCode
bonus_1 = Hours
bonus_2 = Hours2
# IsActive column to filter bonus hours (TRUE = include, FALSE = exclude)
bonus_isactive_column = IsActive

# Aircraft type lookup configuration
ac_type_file = Regis.xlsx

# Aircraft type lookup - column names in the Regis.xlsx file
ac_type_registration_column = Regis
ac_type_type_column = Type

[UploadedSheet]
seq_no = SEQ
title = forecast.event_display
planned_mhrs = forecast.est_mh
special_code = scl.special
# Column for extracting ac_name and wp_type
a_column = wph.wpno

[ToolControlColumns]
# Column names for tool control feature
tool_name = part.description
tool_type = part.tool
tool_partno = prq2.partno
total_qty = total_qty
alt_qty = altpart_total_qty

[SEQ_Mappings]
SEQ_2.x = true
SEQ_3.x = true
SEQ_4.x = true
SEQ_5.x = ignore
SEQ_6.x = ignore
SEQ_7.x = ignore
SEQ_8.x = ignore
SEQ_9.x = ignore
SEQ_10.x = ignore

[SEQ_ID_Mappings]
SEQ_2.x_ID = -
SEQ_3.x_ID = -
SEQ_4.x_ID = /
SEQ_5.x_ID = -
SEQ_6.x_ID = -
SEQ_7.x_ID = -
SEQ_8.x_ID = -
SEQ_9.x_ID = -
SEQ_10.x_ID = -

# ─────────────────────────────────────────────────────────────────────────────
# Per-sheet SEQ overrides
# Each section controls which SEQ rows are INCLUDED in that specific output.
# Values: true = include,  ignore = exclude
# Any SEQ key not listed here falls back to the base [SEQ_Mappings] value.
# "true" vs "false" distinction (reference-check flag) is inherited from base;
# these sections only control include/exclude for their respective output.
# ─────────────────────────────────────────────────────────────────────────────

[SEQ_MHR_Mappings]
# Controls which SEQs contribute to man-hour totals (Total Man-Hours sheet)
# Example: exclude SEQ 10.x from MHR calculation but keep it elsewhere
SEQ_10.x = ignore

[SEQ_NewTask_Mappings]
# Controls which SEQs are scanned for new task IDs (New Task IDs sheet)
# Example: include SEQ 10.x in new task ID detection
SEQ_10.x = ignore

[SEQ_ToolControl_Mappings]
# Controls which SEQs are scanned for tool/spare availability (Tool Control sheet)
# Example: include SEQ 10.x in tool control checks
SEQ_5.x = true
SEQ_6.x = true
SEQ_7.x = true
SEQ_8.x = true
SEQ_9.x = true
SEQ_10.x = true

[SEQ_Coefficients]
# Man-hour coefficient multipliers for each SEQ prefix
# These coefficients are applied to the planned man-hours calculation
# Default coefficient is 1.0 for any SEQ not listed here
SEQ_2.x = 2.2
SEQ_3.x = 2.2
SEQ_4.x = 1.1
default_coefficient = 1.1

[SkipCoefficient]
# Task codes that should skip the normal coefficient and use array_skip_coefficient instead
# Enter comma-separated list of codes (partial matching supported)
# Example: skip_codes = abc, def, idk
skip_codes = vna

# Coefficient to use for skipped task codes (default: 1.0)
array_skip_coefficient = 1.0

[Thresholds]
high_mhrs_hours = 16
random_sample_size = 10
# Hours per work shift for "Man per day" calculation
hours_per_shift = 8

[Output]
# Show bonus hours breakdown in Total Man-Hours sheet
show_bonus_hours_breakdown = True

